<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Outfitted</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
    <img src="images/brand-icon.png" alt="Logo" class="brand-icon">
    <span class="brand-name">Outfitted</span>
    </div>

    <a href="#posts-section" class="browse-button">Browse</a>
  </header>

  <main>
    <section class="hero">
      <h1>Your Outfits, Shoppable</h1>
      <p>Share your looks with direct links to buy every piece.</p>
    </section>

    <section class="posts-section" id="posts-section">
      <div id="posts-grid" class="posts-grid"></div>
    </section>
  </main>

  <div id="post-modal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" id="modal-backdrop"></div>

    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button id="close-modal" class="close-modal" aria-label="Close">×</button>

      <div class="modal-body">
        <div class="modal-gallery">
          <button id="prev-image" class="gallery-arrow left" aria-label="Previous image">‹</button>
          <img id="modal-image" src="" alt="" />
          <button id="next-image" class="gallery-arrow right" aria-label="Next image">›</button>
        </div>

        <div class="modal-info">
          <h2 id="modal-title"></h2>
          <p id="modal-description" class="modal-description"></p>

          <div id="modal-tags" class="tags"></div>

          <div class="links-section">
            <h3>Shop this look</h3>
            <div id="modal-links" class="affiliate-links"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
